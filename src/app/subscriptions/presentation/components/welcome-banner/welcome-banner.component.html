<div class="welcome-banner">
  <!-- Welcome Header -->
  <div class="welcome-header">
    <div class="welcome-text">
      <span class="welcome-label">{{ 'welcomeBanner.welcome' | translate }}</span>
      <h1 class="greeting">
        {{ 'welcomeBanner.hello' | translate }}
        <span class="username">{{currentUser()?.name}}</span>
        <span class="wave">👋</span>
      </h1>
    </div>
    <div class="action-buttons">
      <button
        class="btn"
        [class.btn-premium]="isPremiumUser()"
        [class.btn-basic]="!isPremiumUser()"
        (click)="onCurrentPlanClick()">
        {{ isPremiumUser() ? ('welcomeBanner.currentPremium' | translate) : ('welcomeBanner.currentBasic' | translate) }}
      </button>
      <button class="btn btn-view-more" (click)="showPlans()">
        {{ 'welcomeBanner.viewMore' | translate }}
      </button>
    </div>
  </div>

  <!-- Subscription Plans Modal -->
  <app-subscription-plans-modal
    [isVisible]="showPlansModal()"
    (closeModal)="closePlans()"
    (planSelected)="onPlanSelect($event)">
  </app-subscription-plans-modal>
</div>
