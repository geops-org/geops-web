<div class="payment-confirmation">
  <div class="confirmation-card">
    <div class="confirmation-header">
      <h3>{{ 'payment.confirmation.title' | translate }}</h3>
      <p>{{ 'payment.confirmation.subtitle' | translate }}</p>
    </div>

    <div class="payment-code">{{ payment.paymentCode }}</div>

    <button
      mat-button
      class="close-button"
      (click)="onClose()">
      {{ 'payment.confirmation.continue' | translate }}
    </button>
  </div>
</div>
