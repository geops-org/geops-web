<div class="layout">
  <h2 class="page-title">{{ 'coupons.title' | translate }}</h2>

  <!-- Loading state -->
  @if (loading()) {
    <div class="loading-container">
      <p>{{ 'coupons.loading' | translate }}</p>
    </div>
  }

  <!-- Error state -->
  @if (error()) {
    <div class="error-container">
      <p>{{ error() }}</p>
    </div>
  }

  <!-- Empty state -->
  @if (isEmpty() && !loading()) {
    <div class="empty-container">
      <p>{{ 'coupons.empty' | translate }}</p>
    </div>
  }

  <!-- Coupon list -->
  @if (!isEmpty() && !loading()) {
    <ng-container *ngFor="let c of coupons()">
      <app-coupon-item [coupon]="c"></app-coupon-item>
    </ng-container>
  }
</div>
